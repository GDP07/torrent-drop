<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TorrentDrop</title>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<style>
  :root {
    --bg: #f5f7f6; --card: #ffffff; --text: #16201d; --muted: #687774;
    --border: rgba(0,0,0,0.05); --stat-bg: #f4f6f5; --pill-bg: #eef2f0; --pill-text: #5a6663;
    --input-bg: #f5f7f6; --accent: #0f6e56; --accent-hover: #1d9e75; --accent-soft: rgba(15,110,86,0.10);
    --error: #d63a3f; --error-soft: rgba(214,58,63,0.10);
    --warn-bg: #fff5d6; --warn-text: #7a5c00; --warn-border: rgba(122,92,0,0.25);
    --track: rgba(0,0,0,0.07); --shadow: none;
    --toast-bg: #1c2522; --toast-text: #f3f5f4;
  }
  [data-theme="dark"] {
    --bg: #0d100f; --card: #161a18; --text: #e7ebe9; --muted: #95a09c;
    --border: rgba(255,255,255,0.07); --stat-bg: #151917; --pill-bg: #1e2422; --pill-text: #aab4b0;
    --input-bg: #151917; --accent: #169c79; --accent-hover: #1fc295; --accent-soft: rgba(31,194,149,0.13);
    --error: #ff6166; --error-soft: rgba(255,97,102,0.13);
    --warn-bg: #2c2510; --warn-text: #e7c869; --warn-border: rgba(231,200,105,0.25);
    --track: rgba(255,255,255,0.08); --shadow: none;
    --toast-bg: #e7ebe9; --toast-text: #16201d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; font-weight: 400; line-height: 1.45; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 840px; margin: 0 auto; padding: 30px 20px 90px; }

  .banner {
    display: none; align-items: center; gap: 8px;
    background: var(--warn-bg); color: var(--warn-text); border: 0.5px solid var(--warn-border);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
  }
  .banner.show { display: flex; }
  .banner.err { background: var(--error-soft); color: var(--error); border-color: var(--error); }
  .banner i { font-size: 18px; }
  .banner code { background: rgba(0,0,0,0.12); padding: 1px 6px; border-radius: 4px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
  .brand { display: flex; align-items: center; gap: 11px; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .brand .logo { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 10px; background: var(--accent); color: #fff; font-size: 20px; }
  .brand .tag { font-size: 10.5px; color: var(--muted); font-weight: 500; background: var(--stat-bg); padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em; }
  .icon-btn { display: grid; place-items: center; width: 38px; height: 38px; border-radius: 10px; border: none; background: var(--stat-bg); color: var(--text); cursor: pointer; font-size: 18px; transition: background 0.15s; }
  .icon-btn:hover { background: var(--pill-bg); }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 30px; }
  .stat { background: transparent; border-radius: 0; padding: 0; }
  .stat .label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.045em; }
  .stat .label i { font-size: 13px; opacity: 0.7; }
  .stat .value { font-size: 23px; font-weight: 600; letter-spacing: -0.02em; }

  .add { display: flex; gap: 10px; margin-bottom: 8px; }
  .add input { flex: 1; min-width: 0; background: var(--input-bg); color: var(--text); border: 1px solid transparent; border-radius: 11px; padding: 13px 15px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .add input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .btn, .mini, .tab, .icon-btn { user-select: none; -webkit-user-select: none; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; border: none; border-radius: 10px; padding: 12px 18px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap; background: var(--accent); color: #fff; transition: background 0.15s; }
  .btn:hover { background: var(--accent-hover); }
  .autosave { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 16px; cursor: pointer; user-select: none; }
  .autosave input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

  .tabs { display: flex; gap: 22px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab { border: none; background: transparent; color: var(--muted); border-radius: 0; padding: 9px 1px; font-size: 13.5px; cursor: pointer; transition: color 0.15s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab:hover { color: var(--text); }
  .tab.active { background: transparent; color: var(--text); font-weight: 600; border-bottom-color: var(--accent); }

  .list { display: flex; flex-direction: column; gap: 12px; }
  .empty { text-align: center; color: var(--muted); padding: 48px 16px; border: 1px dashed var(--border); border-radius: 12px; }
  .empty i { font-size: 34px; display: block; margin-bottom: 10px; opacity: 0.6; }

  .torrent { background: var(--card); border: none; border-radius: 14px; padding: 16px 18px; box-shadow: none; transition: background 0.15s; }
  .torrent.seeding, .torrent.error { border: none; }
  .t-head { display: flex; align-items: flex-start; gap: 12px; }
  .t-icon { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 11px; background: var(--stat-bg); color: var(--muted); font-size: 20px; flex-shrink: 0; }
  .t-main { flex: 1; min-width: 0; }
  .t-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .t-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .pill { flex-shrink: 0; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--pill-bg); color: var(--pill-text); text-transform: uppercase; letter-spacing: 0.03em; }
  .pill.downloading { background: var(--accent-soft); color: var(--accent); }
  .pill.seeding { background: var(--accent-soft); color: var(--accent-hover); }
  .pill.error { background: var(--error-soft); color: var(--error); }
  .t-sub { font-size: 12px; color: var(--muted); }
  .bar { height: 3px; border-radius: 3px; background: var(--track); overflow: hidden; margin: 12px 0; }
  .bar > span { display: block; height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s ease; }
  .t-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .t-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .t-actions { display: flex; flex-wrap: wrap; gap: 8px; }
  .mini { display: inline-flex; align-items: center; gap: 6px; border: none; background: var(--stat-bg); color: var(--text); border-radius: 9px; padding: 8px 13px; font-size: 13px; font-family: inherit; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .mini:hover { background: var(--pill-bg); }
  .mini.danger:hover { color: var(--error); background: var(--error-soft); }
  .mini.primary { background: var(--accent); border-color: transparent; color: #fff; }
  .mini.primary:hover { background: var(--accent-hover); }
  .mini:disabled { opacity: 0.5; cursor: default; }
  .mini:disabled:hover { background: transparent; }

  .files { margin-top: 14px; border-top: 0.5px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 10px; }
  .file { display: flex; align-items: center; gap: 10px; }
  .file .f-icon { color: var(--muted); font-size: 18px; flex-shrink: 0; }
  .file .f-main { flex: 1; min-width: 0; }
  .file .f-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file .f-sub { font-size: 11px; color: var(--muted); }
  .file .bar { margin: 5px 0 0; }
  .file .mini { flex-shrink: 0; padding: 6px 10px; font-size: 12px; }

  .toasts { position: fixed; right: 16px; bottom: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; max-width: calc(100vw - 32px); }
  .toast { background: var(--toast-bg); color: var(--toast-text); padding: 11px 16px; border-radius: 10px; font-size: 13px; box-shadow: 0 6px 20px rgba(0,0,0,0.18); opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .spin { animation: spin 0.9s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .add { flex-direction: column; }
    .add .btn { width: 100%; }
  }

  /* ---- wizard / settings modal ---- */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 16px; }
  .overlay.show { display: flex; }
  .modal { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; width: 100%; max-width: 440px; padding: 26px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); max-height: calc(100vh - 32px); overflow-y: auto; overflow-x: hidden; }
  .src-pill { display: flex; align-items: center; gap: 8px; background: var(--stat-bg); border: 0.5px solid var(--border); border-radius: 9px; padding: 9px 12px; margin-bottom: 20px; font-size: 12.5px; color: var(--muted); }
  .src-pill i { flex-shrink: 0; font-size: 15px; }
  .src-pill span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .modal .w-logo { width: 48px; height: 48px; border-radius: 12px; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 26px; margin-bottom: 16px; }
  .modal h2 { margin: 0 0 6px; font-size: 20px; font-weight: 600; }
  .modal p.sub { margin: 0 0 20px; color: var(--muted); font-size: 13.5px; }
  .w-steps { display: flex; gap: 6px; margin-bottom: 18px; }
  .w-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--track); }
  .w-dot.on { background: var(--accent); }
  .field { margin-bottom: 18px; }
  .field > label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
  .field select, .field input[type=text], .field input[type=number], .field input[type=datetime-local] { width: 100%; padding: 10px 12px; border-radius: 9px; border: 0.5px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
  .field select:focus, .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .choice { display: flex; flex-direction: column; gap: 10px; }
  .opt { display: flex; gap: 11px; align-items: flex-start; border: 1px solid var(--border); border-radius: 11px; padding: 12px 13px; cursor: pointer; transition: border-color .15s, background .15s; }
  .opt:hover { background: var(--stat-bg); }
  .opt.sel { border-color: var(--accent); background: var(--accent-soft); }
  .opt input { margin-top: 2px; accent-color: var(--accent); }
  .opt .o-title { font-size: 14px; font-weight: 500; }
  .opt .o-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .w-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 22px; }
  .btn.ghost { background: transparent; color: var(--muted); border: 0.5px solid var(--border); }
  .btn.ghost:hover { background: var(--stat-bg); }
  [dir=rtl] .w-actions { flex-direction: row-reverse; }
  [dir=rtl] .opt { flex-direction: row-reverse; text-align: right; }
</style>
</head>
<body>
<div class="wrap">

  <div class="banner err" id="banner">
    <i class="ti ti-plug-connected-x"></i>
    <span>Can't reach the local engine. In the project folder run <code>node server.js</code>, then refresh.</span>
  </div>

  <header>
    <div class="brand">
      <span class="logo"><i class="ti ti-magnet"></i></span>
      <span>TorrentDrop</span>
      <span class="tag" data-i18n="app_tag">local engine</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings"><i class="ti ti-settings"></i></button>
      <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme"><i class="ti ti-moon"></i></button>
    </div>
  </header>

  <section class="stats" id="stats"></section>

  <div class="add">
    <input id="input" type="text" data-i18n-ph="add_placeholder" placeholder="Paste a magnet link, info hash, or .torrent URL…" autocomplete="off" spellcheck="false" />
    <button class="icon-btn" id="scheduleBtn" title="Schedule for later" aria-label="Schedule"><i class="ti ti-clock"></i></button>
    <button class="btn" id="addBtn"><i class="ti ti-cloud-download"></i> <span data-i18n="add_btn">Add torrent</span></button>
  </div>
  <label class="autosave"><input type="checkbox" id="autoSaveChk" /> <span data-i18n="autosave_label">Auto-save finished torrents to my device (browser Downloads)</span></label>

  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all" data-i18n="tab_all">All</button>
    <button class="tab" data-filter="downloading" data-i18n="tab_downloading">Downloading</button>
    <button class="tab" data-filter="seeding" data-i18n="tab_seeding">Seeding</button>
    <button class="tab" data-filter="scheduled" data-i18n="tab_scheduled">Scheduled</button>
    <button class="tab" data-filter="history" data-i18n="tab_history">History</button>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="overlay" id="wizard"><div class="modal" id="wizardModal"></div></div>
<div class="overlay" id="settingsOverlay"><div class="modal" id="settingsModal"></div></div>
<div class="overlay" id="scheduleOverlay"><div class="modal" id="scheduleModal"></div></div>

<div class="toasts" id="toasts"></div>

<script>

var isDesktop = !!(window.tdNative && window.tdNative.showItem); // running in the Electron app
var torrents = [];
var history = [];
var scheduled = [];
var expanded = {};
var filter = 'all';
var connected = false;
var seenStatus = {};   // infoHash -> last seen status (to detect completion transitions)
var autoSaved = {};    // infoHash -> already auto-downloaded this session
var autoSave = true;   // auto-download finished torrents to the browser

var bannerEl = document.getElementById('banner');
var statsEl = document.getElementById('stats');
var listEl = document.getElementById('list');
var inputEl = document.getElementById('input');
var addBtn = document.getElementById('addBtn');
var tabsEl = document.getElementById('tabs');
var toastsEl = document.getElementById('toasts');
var themeBtn = document.getElementById('themeBtn');
var autoSaveChk = document.getElementById('autoSaveChk');

/* ---- helpers ---- */
function find(ih){ for (var i=0;i<torrents.length;i++){ if (torrents[i].infoHash===ih) return torrents[i]; } return null; }

function formatSize(b){
  if (!b || b<0) b=0;
  if (b<1024) return Math.round(b)+' B';
  var kb=b/1024; if (kb<1024) return (kb>=100?Math.round(kb):kb.toFixed(1))+' KB';
  var mb=kb/1024; if (mb<1024) return (mb>=100?Math.round(mb):mb.toFixed(1))+' MB';
  var gb=mb/1024; return (gb>=100?Math.round(gb):gb.toFixed(1))+' GB';
}
function formatSpeed(bps){
  if (!bps || bps<1) return '0 KB/s';
  if (bps<1024) return Math.round(bps)+' B/s';
  if (bps<1024*1024) return (bps/1024).toFixed(1)+' KB/s';
  return (bps/(1024*1024)).toFixed(1)+' MB/s';
}
function formatETA(sec){
  if (!isFinite(sec) || sec<=0) return '—';
  sec=Math.round(sec);
  var h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  if (h>0) return h+'h '+m+'m';
  if (m>0) return m+'m '+s+'s';
  return s+'s';
}

var EXT = {
  movie: ['mp4','mkv','avi','mov','webm','flv','wmv','m4v','mpg','mpeg','ts','3gp'],
  music: ['mp3','flac','wav','aac','ogg','m4a','wma','opus','aiff'],
  archive: ['zip','rar','7z','tar','gz','bz2','xz','iso','dmg'],
  photo: ['jpg','jpeg','png','gif','webp','bmp','svg','tiff','heic'],
  doc: ['pdf','doc','docx','txt','epub','mobi','rtf','odt','md']
};
function extOf(n){ var p=(n||'').split('.'); return p.length>1?p.pop().toLowerCase():''; }
function getFileIcon(n){
  var e=extOf(n);
  if (EXT.movie.indexOf(e)>=0) return 'ti-movie';
  if (EXT.music.indexOf(e)>=0) return 'ti-music';
  if (EXT.archive.indexOf(e)>=0) return 'ti-file-zip';
  if (EXT.photo.indexOf(e)>=0) return 'ti-photo';
  if (EXT.doc.indexOf(e)>=0) return 'ti-file-text';
  return 'ti-file';
}
function getTorrentIcon(o){
  var f=o.files||[], mv=false, mu=false, ar=false;
  for (var i=0;i<f.length;i++){ var e=extOf(f[i].name);
    if (EXT.movie.indexOf(e)>=0) mv=true; else if (EXT.music.indexOf(e)>=0) mu=true; else if (EXT.archive.indexOf(e)>=0) ar=true; }
  if (mv) return 'ti-movie';
  if (mu) return 'ti-music';
  if (ar) return 'ti-file-zip';
  if (f.length===1) return getFileIcon(f[0].name);
  return 'ti-folder';
}
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function truncate(s,n){ s=String(s==null?'':s); return s.length>n?s.slice(0,n-1)+'…':s; }

function showToast(text){
  var el=document.createElement('div'); el.className='toast'; el.textContent=text; toastsEl.appendChild(el);
  requestAnimationFrame(function(){ el.classList.add('show'); });
  setTimeout(function(){ el.classList.remove('show'); setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },300); },3000);
}

/* ---- i18n ---- */
var LANGS = [['en','English'],['es','Español'],['fr','Français'],['de','Deutsch'],['pt','Português'],['ar','العربية'],['zh','中文'],['hi','हिन्दी']];
var I18N = {
  en: {
    app_tag:'local engine', add_placeholder:'Paste a magnet link, info hash, or .torrent URL…', add_btn:'Add torrent',
    autosave_label:'Auto-save finished torrents to my device (browser Downloads)',
    tab_all:'All', tab_downloading:'Downloading', tab_seeding:'Seeding',
    stat_downloaded:'Downloaded', stat_dl_speed:'Download speed', stat_active:'Active', stat_seeding:'Seeding',
    empty_main:'Paste a magnet link above to start downloading.', empty_filter:'No torrents in this view.',
    st_fetching:'Fetching', st_seeding:'Seeding', st_paused:'Paused', st_error:'Error', st_downloading:'Downloading {p}%',
    save:'Save', downloading:'Downloading…', save_to_device:'Save to device', retry:'Retry', pause:'Pause', resume:'Resume', remove:'Remove',
    hide_files:'Hide files', files_n:'{n} files', peers:'peers', done:'done',
    w_welcome_t:'Welcome to TorrentDrop', w_welcome_s:'A quick setup — under a minute.', w_lang:'Language',
    w_next:'Next', w_back:'Back', w_get_started:'Get started',
    w_seed_t:'Sharing & seeding', w_seed_s:'After a download finishes, should TorrentDrop keep uploading to others?',
    w_seed_yes_t:'Keep seeding (recommended)', w_seed_yes_d:'Stay connected and upload to help the swarm. Better for everyone.',
    w_seed_no_t:'Stop when done', w_seed_no_d:'Finish downloading, then stop uploading immediately.',
    w_ratio:'Stop seeding at ratio (0 = forever)', w_ratio_hint:'e.g. 2 means upload twice what you downloaded, then stop.',
    w_done_t:'You’re all set', w_done_s:'TorrentDrop is ready. Paste a magnet link to start.',
    s_title:'Settings', s_sub:'Some changes apply after a restart.', s_lang:'Language', s_seed:'Seeding',
    s_seed_on:'Keep seeding after download', s_seed_off:'Stop uploading when done', s_ratio:'Seed ratio limit (0 = unlimited)',
    s_autosave:'Auto-save finished files to my device', s_save:'Save', s_cancel:'Cancel', s_saved:'Settings saved', s_restart_note:'Connection/folder changes take effect on restart.'
  },
  es: {
    app_tag:'motor local', add_placeholder:'Pega un enlace magnet, info hash o URL .torrent…', add_btn:'Añadir torrent',
    autosave_label:'Guardar automáticamente los torrents terminados en mi dispositivo',
    tab_all:'Todos', tab_downloading:'Descargando', tab_seeding:'Compartiendo',
    stat_downloaded:'Descargado', stat_dl_speed:'Velocidad', stat_active:'Activos', stat_seeding:'Compartiendo',
    empty_main:'Pega un enlace magnet arriba para empezar.', empty_filter:'No hay torrents en esta vista.',
    st_fetching:'Obteniendo', st_seeding:'Compartiendo', st_paused:'Pausado', st_error:'Error', st_downloading:'Descargando {p}%',
    save:'Guardar', downloading:'Descargando…', save_to_device:'Guardar', retry:'Reintentar', pause:'Pausar', resume:'Reanudar', remove:'Eliminar',
    hide_files:'Ocultar archivos', files_n:'{n} archivos', peers:'pares', done:'listo',
    w_welcome_t:'Bienvenido a TorrentDrop', w_welcome_s:'Configuración rápida — menos de un minuto.', w_lang:'Idioma',
    w_next:'Siguiente', w_back:'Atrás', w_get_started:'Empezar',
    w_seed_t:'Compartir y sembrar', w_seed_s:'Cuando termine una descarga, ¿debe TorrentDrop seguir subiendo a otros?',
    w_seed_yes_t:'Seguir compartiendo (recomendado)', w_seed_yes_d:'Sube para ayudar a la red. Mejor para todos.',

function t(key, vars){
  var s = (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key;

function applyI18n(){
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', lang==='ar' ? 'rtl' : 'ltr');
  var nodes = document.querySelectorAll('[data-i18n]');
  for (var i=0;i<nodes.length;i++){ nodes[i].textContent = t(nodes[i].getAttribute('data-i18n')); }
  var phs = document.querySelectorAll('[data-i18n-ph]');
  for (var j=0;j<phs.length;j++){ phs[j].setAttribute('placeholder', t(phs[j].getAttribute('data-i18n-ph'))); }

}

  try { var d = await api('/api/config'); if (d && d.config) cfg = d.config; } catch(e){}
  lang = cfg.language || 'en';

}

function langSelect(id, current){
  var h='<select id="'+id+'">';

}

/* ---- API ---- */
async function api(path, body){
  var opts = { method: body?'POST':'GET' };
  if (body){ opts.headers={'Content-Type':'application/json'}; opts.body=JSON.stringify(body); }
  var r = await fetch(path, opts);
  if (r.status === 401){ location.reload(); throw new Error('unauthorized'); }
  return r.json();
}

async function poll(){
  try {
    var data = await api('/api/torrents');
    var list = data.torrents || [];
    handleCompletions(list);
    torrents = list;
    connected = true;
    bannerEl.classList.remove('show');
    if (filter==='history'){ try { history=(await api('/api/history')).history||[]; }catch(e){} }
    if (filter==='scheduled'){ try { scheduled=(await api('/api/scheduled')).scheduled||[]; }catch(e){} }
  } catch(e){
    connected = false;
    bannerEl.classList.add('show');
  }
  renderAll();
}

// Detect torrents that just transitioned into "seeding" (finished) and auto-save them.
function handleCompletions(list){
  for (var i=0;i<list.length;i++){
    var t=list[i];
    var prev=seenStatus[t.infoHash];
    if (autoSave && t.status==='seeding' && prev && prev!=='seeding' && !autoSaved[t.infoHash]){
      autoSaved[t.infoHash]=true;
      autoDownload(t);
    }
    seenStatus[t.infoHash]=t.status;
  }
}

function autoDownload(o){
  var files=(o.files||[]).filter(function(f){ return f.done; });
  if (!files.length) return;
  showToast('“'+truncate(o.name||'Torrent',32)+'” complete — saving to your device…');
  var delay=0;
  for (var i=0;i<files.length;i++){
    (function(idx){ setTimeout(function(){ save(o.infoHash, idx); }, delay); })(files[i].index);
    delay+=1200; // stagger so the browser doesn't drop simultaneous downloads
  }
}

async function addInput(val){
  val = (val==null?inputEl.value:val).trim();
  if (!val) return;
  inputEl.value=''; setFilter('all');
  try {
    var d = await api('/api/add', { input: val });
    if (d.error) showToast(d.duplicate?'Already added':d.error);
    else { showToast('Torrent added'); poll(); }
  } catch(e){ showToast('Local engine not reachable'); }
}

async function pause(ih){ try{ await api('/api/pause',{infoHash:ih}); poll(); }catch(e){} }
async function resume(ih){ try{ await api('/api/resume',{infoHash:ih}); poll(); }catch(e){} }
async function remove(ih){ delete seenStatus[ih]; delete autoSaved[ih]; try{ await api('/api/remove',{infoHash:ih}); showToast('Removed — files deleted'); poll(); }catch(e){} }
async function retry(ih){ var o=find(ih); if(!o) return; delete seenStatus[ih]; delete autoSaved[ih]; try{ await api('/api/remove',{infoHash:ih}); await api('/api/add',{input:o.magnetURI||ih}); poll(); }catch(e){} }
async function save(ih, idx){
  var url='/api/download?ih='+encodeURIComponent(ih)+'&idx='+idx;
  var o=find(ih); var f=(o&&o.files)?o.files[idx]:null; var fname=(f&&f.name)?f.name:('download-'+idx);

  // Best path: stream straight to a file the user picks (File System Access API).
  // Bytes flow disk->browser->disk without buffering the whole file in memory,
  // so multi-GB downloads work. Requires a user gesture, so this only runs on a click.
  if (window.showSaveFilePicker){
    var handle;
    try { handle = await window.showSaveFilePicker({ suggestedName: fname }); }
    catch(e){ if (e && e.name==='AbortError') return; handle = null; } // cancelled, or not allowed here
    if (handle){
      try {
        var writable = await handle.createWritable();
        var resp = await fetch(url);
        if (!resp.ok || !resp.body) throw new Error('stream unavailable');
        await resp.body.pipeTo(writable);            // streams to disk, closes on finish
        showToast('Saved “'+truncate(fname,32)+'” to your device');
        return;
      } catch(e){
        showToast('Save failed — falling back to browser download'); // fall through
      }
    }
  }

  // Fallback: classic browser download. Now resumable for free via Accept-Ranges.
  var a=document.createElement('a'); a.href=url;
  document.body.appendChild(a); a.click(); a.remove();
}

/* ---- rendering ---- */
function statusInfo(o){
  switch(o.status){
    case 'fetching': return { cls:'', text:t('st_fetching') };
    case 'seeding': return { cls:'seeding', text:t('st_seeding') };
    case 'completed': return { cls:'seeding', text:t('st_completed') };
    case 'paused': return { cls:'', text:t('st_paused') };
    case 'error': return { cls:'error', text:t('st_error') };
    default: return { cls:'downloading', text:t('st_downloading',{p:Math.round((o.progress||0)*100)}) };
  }
}
function barFor(progress, status){
  var pct=Math.max(0,Math.min(100,Math.round((progress||0)*100)));
  var color = status==='error'?'var(--error)':(status==='seeding'?'var(--accent-hover)':'var(--accent)');
  return '<div class="bar"><span style="width:'+pct+'%;background:'+color+';"></span></div>';
}
function fileRowHtml(o,f){
  var pct=Math.round((f.progress||0)*100);
  var btn = !f.done
    ? '<button class="mini" disabled><i class="ti ti-download"></i> '+t('downloading')+'</button>'
    : (isDesktop
        ? '<button class="mini" data-action="openfolder" data-path="'+escapeHtml(o.savePath||'')+'" title="'+t('open_folder')+'"><i class="ti ti-folder"></i></button>'
        : '<button class="mini primary" data-action="save" data-ih="'+o.infoHash+'" data-idx="'+f.index+'"><i class="ti ti-download"></i> '+t('save')+'</button>');
  return '<div class="file">'+
    '<i class="ti '+getFileIcon(f.name)+' f-icon"></i>'+
    '<div class="f-main">'+
      '<div class="f-name" title="'+escapeHtml(f.name)+'">'+escapeHtml(truncate(f.name,48))+'</div>'+
      '<div class="f-sub">'+formatSize(f.length)+' • '+pct+'%</div>'+
      barFor(f.progress,o.status)+
    '</div>'+btn+'</div>';
}
function cardHtml(o){
  var si=statusInfo(o);
  var bc = o.status==='seeding'?' seeding':(o.status==='error'?' error':'');
  var single = o.files.length===1;
  var sub = o.status==='error' ? escapeHtml(o.error||'Something went wrong')
                               : formatSize(o.downloaded)+' / '+(o.length?formatSize(o.length):'—');
  var meta='';
  if (o.status==='completed'){
    meta='<div class="t-meta"><span><i class="ti ti-circle-check"></i> '+t('done')+'</span></div>';
  } else if (o.status!=='error' && o.status!=='fetching'){
    meta='<div class="t-meta">'+
      '<span><i class="ti ti-arrow-down"></i> '+formatSpeed(o.downloadSpeed)+'</span>'+
      '<span><i class="ti ti-arrow-up"></i> '+formatSpeed(o.uploadSpeed)+'</span>'+
      '<span><i class="ti ti-users"></i> '+(o.numPeers||0)+' '+t('peers')+'</span>'+
      '<span><i class="ti ti-clock"></i> '+(o.status==='seeding'?t('done'):formatETA((o.timeRemaining||0)/1000))+'</span>'+
    '</div>';
  }
  var finished = o.status==='completed' || o.status==='seeding' || (single && o.files[0] && o.files[0].done);
  var openBtn = '<button class="mini primary" data-action="openfolder" data-path="'+escapeHtml(o.savePath||'')+'"><i class="ti ti-folder"></i> '+t('open_folder')+'</button>';
  var actions='';
  if (o.status==='error') actions+='<button class="mini primary" data-action="retry" data-ih="'+o.infoHash+'"><i class="ti ti-refresh"></i> '+t('retry')+'</button>';
  else if (o.status==='downloading'||o.status==='fetching') actions+='<button class="mini" data-action="pause" data-ih="'+o.infoHash+'"><i class="ti ti-player-pause"></i> '+t('pause')+'</button>';
  else if (o.status==='paused') actions+='<button class="mini" data-action="resume" data-ih="'+o.infoHash+'"><i class="ti ti-player-play"></i> '+t('resume')+'</button>';

  if (single && o.status!=='error'){
    if (o.files[0] && o.files[0].done){
      actions += isDesktop ? openBtn
        : '<button class="mini primary" data-action="save" data-ih="'+o.infoHash+'" data-idx="0"><i class="ti ti-download"></i> '+t('save_to_device')+'</button>';
    } else {
      actions += '<button class="mini" disabled><i class="ti ti-download"></i> '+t('downloading')+'</button>';
    }
  } else if (o.files.length>1){
    if (finished && isDesktop) actions += openBtn;
    var open=!!expanded[o.infoHash];
    actions+='<button class="mini" data-action="toggle" data-ih="'+o.infoHash+'"><i class="ti '+(open?'ti-chevron-up':'ti-chevron-down')+'"></i> '+(open?t('hide_files'):t('files_n',{n:o.files.length}))+'</button>';
  }
  actions+='<button class="mini danger" data-action="remove" data-ih="'+o.infoHash+'"><i class="ti ti-trash"></i> '+t('remove')+'</button>';

  var filesHtml='';
  if (!single && expanded[o.infoHash] && o.files.length){
    var rows=''; for (var i=0;i<o.files.length;i++) rows+=fileRowHtml(o,o.files[i]);
    filesHtml='<div class="files">'+rows+'</div>';
  }

  return '<div class="torrent'+bc+'">'+
    '<div class="t-head">'+
      '<div class="t-icon"><i class="ti '+getTorrentIcon(o)+'"></i></div>'+
      '<div class="t-main">'+
        '<div class="t-title-row">'+
          '<span class="t-name" title="'+escapeHtml(o.name)+'">'+escapeHtml(o.name)+'</span>'+
          '<span class="pill '+si.cls+'">'+si.text+'</span>'+
        '</div>'+
        '<div class="t-sub">'+sub+'</div>'+
      '</div>'+
    '</div>'+
    barFor(o.progress,o.status)+meta+
    '<div class="t-actions">'+actions+'</div>'+filesHtml+
  '</div>';
}
function visibleTorrents(){
  return torrents.filter(function(t){
    if (filter==='downloading') return t.status==='downloading'||t.status==='fetching'||t.status==='paused';
    if (filter==='seeding') return t.status==='seeding';
    return true;
  });
}
function statCard(icon,label,value){
  return '<div class="stat"><div class="label"><i class="ti '+icon+'"></i> '+label+'</div><div class="value">'+value+'</div></div>';
}
function renderStats(){
  var total=0,speed=0,active=0,seeding=0;
  for (var i=0;i<torrents.length;i++){ var to=torrents[i];
    total+=to.downloaded||0; speed+=to.downloadSpeed||0;
    if (to.status==='seeding') seeding++;
    else if (to.status==='downloading'||to.status==='fetching'||to.status==='paused') active++;
  }
  statsEl.innerHTML = statCard('ti-database',t('stat_downloaded'),formatSize(total))+
    statCard('ti-bolt',t('stat_dl_speed'),formatSpeed(speed))+
    statCard('ti-arrow-down-circle',t('stat_active'),String(active))+
    statCard('ti-arrow-up-circle',t('stat_seeding'),String(seeding));
}
function renderAll(){
  renderStats();
  if (filter==='history') return renderHistory();
  if (filter==='scheduled') return renderScheduled();
  if (!torrents.length){
    listEl.innerHTML='<div class="empty"><i class="ti ti-magnet"></i>'+t('empty_main')+'</div>';
    return;
  }
  var vis=visibleTorrents();
  if (!vis.length){ listEl.innerHTML='<div class="empty"><i class="ti ti-filter"></i>'+t('empty_filter')+'</div>'; return; }
  var html=''; for (var i=0;i<vis.length;i++) html+=cardHtml(vis[i]);
  listEl.innerHTML=html;
}
function fmtDate(ms){ try { return new Date(ms).toLocaleString(); } catch(e){ return ''; } }
function fmtCountdown(ms){
  var s=Math.max(0,Math.round((ms-Date.now())/1000));
  var d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60);
  if (d>0) return d+'d '+h+'h'; if (h>0) return h+'h '+m+'m'; if (m>0) return m+'m'; return s+'s';
}
function renderHistory(){
  if (!history.length){ listEl.innerHTML='<div class="empty"><i class="ti ti-history"></i>'+t('history_empty')+'</div>'; return; }
  var html='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="mini" id="clearHistBtn"><i class="ti ti-trash"></i> '+t('clear_history')+'</button></div>';
  for (var i=0;i<history.length;i++){ var h=history[i];
    html+='<div class="torrent"><div class="t-head">'+
      '<div class="t-icon"><i class="ti ti-circle-check"></i></div>'+
      '<div class="t-main"><div class="t-title-row"><span class="t-name" title="'+escapeHtml(h.name)+'">'+escapeHtml(h.name)+'</span></div>'+
      '<div class="t-sub">'+formatSize(h.length)+' • '+t('completed_label')+' '+escapeHtml(fmtDate(h.completedAt))+'</div></div></div>'+
      (h.magnetURI?'<div class="t-actions" style="margin-top:10px"><button class="mini primary" data-action="redownload" data-magnet="'+escapeHtml(h.magnetURI)+'"><i class="ti ti-download"></i> '+t('redownload')+'</button></div>':'')+
    '</div>';
  }
  listEl.innerHTML=html;
}
function renderScheduled(){
  if (!scheduled.length){ listEl.innerHTML='<div class="empty"><i class="ti ti-clock"></i>'+t('scheduled_empty')+'</div>'; return; }
  var html='';
  for (var i=0;i<scheduled.length;i++){ var s=scheduled[i];
    var label=(s.input||'').replace(/^magnet:\?.*?dn=/i,'').split('&')[0];
    try { label=decodeURIComponent(label); } catch(e){}
    if (label.length>52||/^magnet:/i.test(label)) label=t('tab_scheduled')+' item';
    html+='<div class="torrent"><div class="t-head">'+
      '<div class="t-icon"><i class="ti ti-clock"></i></div>'+
      '<div class="t-main"><div class="t-title-row"><span class="t-name">'+escapeHtml(label)+'</span></div>'+
      '<div class="t-sub">'+t('starts_label')+' '+escapeHtml(fmtDate(s.startAt))+' • '+fmtCountdown(s.startAt)+'</div></div></div>'+
      '<div class="t-actions" style="margin-top:10px"><button class="mini danger" data-action="cancelsched" data-id="'+s.id+'"><i class="ti ti-x"></i> '+t('cancel_sched')+'</button></div>'+
    '</div>';
  }
  listEl.innerHTML=html;
}

function initAutoSave(){
  if (isDesktop){
    // Desktop: files already land in the chosen download folder — no second "save".
    autoSave = false;
    var lbl = document.querySelector('.autosave'); if (lbl) lbl.style.display = 'none';
    return;
  }
  try { autoSave = localStorage.getItem('td-autosave') !== 'off'; } catch(e){}
  autoSaveChk.checked = autoSave;
}
autoSaveChk.addEventListener('change', function(){
  autoSave = autoSaveChk.checked;
  try { localStorage.setItem('td-autosave', autoSave ? 'on' : 'off'); } catch(e){}
  showToast(autoSave ? 'Auto-save on' : 'Auto-save off');
});

document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsOverlay').addEventListener('click', function(e){ if (e.target===this) closeSettings(); });

initTheme();
initAutoSave();
renderAll();
fetchConfig().then(function(){ if (!cfg.setupComplete) openWizard(); });
poll();
setInterval(poll, 1000);
</script>
</body>
</html>
